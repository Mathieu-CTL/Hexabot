name: "💡 Feature Request"
description: Create a new ticket for a new feature request.
title: "💡 [FEAT] - <title>"
labels: ["type/feat", "status/triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem statement"
      description: What problem does this feature solve? Who is affected?
      placeholder: "As a..., I want... so that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: Describe the feature you would like to see implemented.
      placeholder: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria"
      description: Define explicitly when this feature is considered done.
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: drawbacks
    attributes:
      label: "Drawbacks / impacts"
      description: What are the drawbacks or side effects of this feature?
      placeholder: Identify drawbacks and impacts while remaining neutral.
    validations:
      required: true

  - type: dropdown
    id: iso
    attributes:
      label: "ISO 25010 quality dimension"
      description: Which quality characteristic does this feature relate to?
      multiple: true
      options:
        - Maintainability
        - Reliability
        - Performance efficiency
        - Security
        - Testability
        - Usability
    validations:
      required: false

  - type: textarea
    id: unresolved
    attributes:
      label: "Unresolved questions"
      description: What questions still remain unresolved?
      placeholder: Identify any open questions.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "Related issues"
      placeholder: "#123, #456"
    validations:
      required: false
