name: "🐛 Bug Report"
description: Create a new ticket for a reproducible bug. Please specify its location.
title: "🐛 [BUG] - <title>"
labels: ["type/bug", "status/triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Please enter an explicit description of your issue.
      placeholder: Short and explicit description of your incident.
    validations:
      required: true

  - type: textarea
    id: reprod
    attributes:
      label: "Reproduction steps"
      description: Please describe the steps to reproduce the issue. Use screenshots if possible.
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behaviour"
      description: What should have happened?
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: bash
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: "Affected component"
      description: Which part of Hexabot is affected?
      multiple: false
      options:
        - api (NestJS backend)
        - frontend (Admin panel)
        - widget (Live chat widget)
        - docker / infra
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Hexabot version / commit SHA"
      placeholder: "e.g. v2.1.0 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "OS"
      description: What is the impacted environment?
      multiple: true
      options:
        - Windows
        - Linux
        - Mac
    validations:
      required: false

  - type: dropdown
    id: browsers
    attributes:
      label: "Browsers"
      description: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Microsoft Edge
        - Opera
    validations:
      required: false